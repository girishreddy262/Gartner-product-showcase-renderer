<style>
  @font-face {
    font-family: 'Satoshi'; font-weight: 400;
    src: url("https://dl.dropboxusercontent.com/scl/fi/o74clrkuslikwmeaytqb9/Satoshi-Regular.otf?rlkey=841n3aza1hrjcxd9khhovrdpa&dl=1") format('opentype');
  }
  @font-face {
    font-family: 'Satoshi'; font-weight: 500;
    src: url("https://dl.dropboxusercontent.com/scl/fi/6ky69vt36s5luaiptrves/Satoshi-Medium.otf?rlkey=07wlgd3atxwqdprj3los485gt&dl=1") format('opentype');
  }
  @font-face {
    font-family: 'Satoshi'; font-weight: 700;
    src: url("https://dl.dropboxusercontent.com/scl/fi/qlodxfd6vcekictpctle4/Satoshi-Bold.otf?rlkey=b9rw1asm3wyqfib7zxcsakjr7&dl=1") format('opentype');
  }
  @font-face {
    font-family: 'Satoshi'; font-weight: 900;
    src: url("https://dl.dropboxusercontent.com/scl/fi/3q5thnvcwxg1cgzjh9e1p/Satoshi-Black.otf?rlkey=2nz2kno81tqp3qu0jai78qkr0&dl=1") format('opentype');
  }
  :root {
    --bg: #0B0F17;
    --bg-card: #131927;
    --bg-card-hover: #1A2336;
    --border: #1E2A40;
    --border-strong: #2A3A55;
    --text: #FFFFFF;
    --text-dim: #8B96AD;
    --text-faint: #5A647C;
    --accent: #0183FF;
    --accent-hover: #2196FF;
    --navy-deep: #003B73;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Satoshi', system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-dim);
    font-size: 14px;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .back-link:hover { background: var(--bg-card); color: var(--text); }
  .breadcrumb {
    flex: 1;
    font-size: 15px;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  .breadcrumb .current { color: var(--text); font-weight: 700; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-weight: 700;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .avatar:hover { background: var(--accent-hover); }
  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .page { max-width: 1400px; margin: 0 auto; padding: 32px 32px 80px; }

  .header-row {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 28px;
    gap: 20px;
  }
  .header-text h1 {
    margin: 0 0 4px 0;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }
  .header-text .meta {
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Hero "Start blank" card */
  .hero-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    display: flex;
    gap: 16px;
    align-items: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    margin-bottom: 36px;
    max-width: 540px;
  }
  .hero-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .hero-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: rgba(1, 131, 255, 0.15);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex: none;
  }
  .hero-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 3px 0;
  }
  .hero-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin: 0;
  }

  .section-header h2 {
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 16px 0;
  }

  .file-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .file-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .file-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .file-thumb {
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #1A2740 0%, #0B1426 100%);
    display: flex; align-items: center; justify-content: center;
    color: rgba(1, 131, 255, 0.3);
    font-size: 40px;
    font-weight: 900;
    position: relative;
  }
  .file-body { padding: 12px 14px; }
  .file-name {
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 4px 0;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .file-meta {
    font-size: 12px;
    color: var(--text-dim);
  }
  .menu-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 26px; height: 26px;
    border-radius: 6px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    cursor: pointer;
    opacity: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }
  .file-card:hover .menu-btn { opacity: 1; }
  .menu-btn:hover { background: rgba(0, 0, 0, 0.8); }

  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 14px;
    background: var(--bg-card);
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin: 0 0 6px 0; }
  .spinner {
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    width: 28px; height: 28px;
    animation: spin 1s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modals (matches projects.html) */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    padding: 28px;
    max-width: 440px;
    width: 100%;
  }
  .modal h2 { margin: 0 0 6px 0; font-size: 20px; font-weight: 700; }
  .modal p { margin: 0 0 18px 0; color: var(--text-dim); font-size: 14px; line-height: 1.5; }
  .modal input, .modal select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    margin-bottom: 16px;
    outline: none;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .modal-actions button.primary { background: var(--accent); border-color: var(--accent); }
  .modal-actions button.primary:hover { background: var(--accent-hover); }
  .modal-actions button:hover:not(.primary) { background: var(--bg-card-hover); }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 12px 18px;
    color: var(--text);
    font-size: 14px;
    z-index: 200;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: slideIn 0.2s ease-out;
  }
  .toast.error { border-color: #FF6B6B; }
  @keyframes slideIn {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>

<script>
const WORKER_URL = 'https://darwinbox-showcase-api.girishreddy262.workers.dev';

// Identity (localStorage; shared with projects.html)
function getUserName() {
  try { return localStorage.getItem('ps_user_name') || ''; } catch { return ''; }
}
function setUserName(name) { try { localStorage.setItem('ps_user_name', name); } catch {} }
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function updateAvatar() {
  const name = getUserName();
  const av = document.getElementById('avatar');
  av.textContent = initials(name);
  av.title = name ? `Signed in as ${name} — click to change` : 'Click to set your name';
}

function promptText(title, body, placeholder, defaultVal) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2>${escapeHtml(title)}</h2>
        <p>${escapeHtml(body)}</p>
        <input id="textInp" placeholder="${escapeHtml(placeholder || '')}" autofocus>
        <div class="modal-actions">
          <button id="cancel">Cancel</button>
          <button class="primary" id="ok">Continue</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#textInp');
    inp.value = defaultVal || '';
    inp.focus(); inp.select();
    const ok = () => {
      const v = inp.value.trim();
      if (!v) { inp.focus(); return; }
      overlay.remove(); resolve(v);
    };
    overlay.querySelector('#ok').onclick = ok;
    overlay.querySelector('#cancel').onclick = () => { overlay.remove(); resolve(null); };
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') ok();
      if (e.key === 'Escape') { overlay.remove(); resolve(null); }
    };
  });
}

// Load folder
const folderId = new URLSearchParams(window.location.search).get('id');
let _folder = null;
let _allFolders = null; // for "Move to..." dropdown

async function loadFolder() {
  if (!folderId) {
    document.getElementById('folderHeading').textContent = 'No project ID';
    document.getElementById('fileGrid').innerHTML = '<div class="empty"><p class="empty-title">Missing project ID</p><p>The URL needs ?id=PROJECT_ID</p></div>';
    return;
  }
  try {
    const r = await fetch(WORKER_URL + '/folders/' + encodeURIComponent(folderId));
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Failed to load');
    _folder = data.folder;
    renderFolder();
  } catch (e) {
    document.getElementById('folderHeading').textContent = 'Could not load project';
    document.getElementById('folderMeta').textContent = e.message;
    document.getElementById('fileGrid').innerHTML = '';
  }
}

function renderFolder() {
  document.getElementById('folderName').textContent = _folder.name || 'Untitled';
  document.getElementById('folderHeading').textContent = _folder.name || 'Untitled';
  document.title = (_folder.name || 'Project') + ' — Product Showcase';
  const fileCount = (_folder.files || []).length;
  document.getElementById('folderMeta').textContent =
    `${_folder.owner || 'unknown'} • ${fileCount} file${fileCount === 1 ? '' : 's'} • Updated ${timeAgo(_folder.updatedAt)}`;
  renderFiles();
}

function renderFiles() {
  const grid = document.getElementById('fileGrid');
  const files = _folder.files || [];
  document.getElementById('filesHeading').textContent =
    files.length ? `Files in this project (${files.length})` : 'Files in this project';
  if (files.length === 0) {
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <p class="empty-title">No files yet</p>
        <p>Click "Start from blank" above to create your first one</p>
      </div>`;
    return;
  }
  grid.innerHTML = files.map(fileCardHTML).join('');
  grid.querySelectorAll('.file-card').forEach(card => {
    card.onclick = (e) => {
      if (e.target.closest('.menu-btn')) return;
      const id = card.dataset.id;
      window.location.href = 'editor.html?file=' + encodeURIComponent(id);
    };
    const menu = card.querySelector('.menu-btn');
    if (menu) menu.onclick = (e) => {
      e.stopPropagation();
      openFileMenu(card.dataset.id, card.dataset.name);
    };
  });
}

function fileCardHTML(f) {
  const letter = (f.name || '?').trim().charAt(0).toUpperCase() || '?';
  return `
    <div class="file-card" data-id="${escapeHtml(f.id)}" data-name="${escapeHtml(f.name || '')}">
      <div class="file-thumb">
        <span>${escapeHtml(letter)}</span>
        <button class="menu-btn" title="More">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
      </div>
      <div class="file-body">
        <div class="file-name">${escapeHtml(f.name || 'Untitled')}</div>
        <div class="file-meta">
          ${f.lastEditor ? escapeHtml(f.lastEditor) + ' • ' : ''}Edited ${timeAgo(f.updatedAt)}
        </div>
      </div>
    </div>`;
}

async function openFileMenu(id, name) {
  const choice = prompt(`File: ${name}\n\nType:\n  R = rename\n  D = duplicate\n  M = move to another project\n  X = delete\n  (anything else to cancel)`);
  if (!choice) return;
  const c = choice.toUpperCase();
  if (c === 'R') {
    const newName = prompt('New name:', name);
    if (!newName || !newName.trim()) return;
    try {
      const r = await fetch(WORKER_URL + '/files/' + encodeURIComponent(id), {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName.trim() })
      });
      if (!r.ok) throw new Error('Rename failed');
      toast('Renamed'); loadFolder();
    } catch (e) { toast(e.message, 'error'); }
  } else if (c === 'D') {
    try {
      const r = await fetch(WORKER_URL + '/files/' + encodeURIComponent(id) + '/duplicate', { method: 'POST' });
      if (!r.ok) throw new Error('Duplicate failed');
      toast('Duplicated'); loadFolder();
    } catch (e) { toast(e.message, 'error'); }
  } else if (c === 'M') {
    moveFileFlow(id, name);
  } else if (c === 'X') {
    if (!confirm(`Delete "${name}"?`)) return;
    try {
      const r = await fetch(WORKER_URL + '/files/' + encodeURIComponent(id), { method: 'DELETE' });
      if (!r.ok) throw new Error('Delete failed');
      toast('Deleted'); loadFolder();
    } catch (e) { toast(e.message, 'error'); }
  }
}

async function moveFileFlow(fileId, fileName) {
  // Load list of folders to pick from (use mine + team)
  const user = getUserName();
  const ownerParam = user ? '?owner=' + encodeURIComponent(user) : '';
  let folders = [];
  try {
    const r = await fetch(WORKER_URL + '/folders' + ownerParam);
    const data = await r.json();
    if (r.ok && data.ok) {
      folders = [...(data.mine || []), ...(data.team || [])].filter(f => f.id !== folderId);
    }
  } catch {}
  if (folders.length === 0) {
    toast('No other projects to move into', 'error');
    return;
  }
  // Build modal with dropdown
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>Move "${escapeHtml(fileName)}"</h2>
      <p>Pick a project to move this file into:</p>
      <select id="folderSelect">
        ${folders.map(f => `<option value="${escapeHtml(f.id)}">${escapeHtml(f.name)} (${escapeHtml(f.owner)})</option>`).join('')}
      </select>
      <div class="modal-actions">
        <button id="cancelMove">Cancel</button>
        <button class="primary" id="confirmMove">Move</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#cancelMove').onclick = () => overlay.remove();
  overlay.querySelector('#confirmMove').onclick = async () => {
    const targetFolderId = overlay.querySelector('#folderSelect').value;
    overlay.remove();
    try {
      const r = await fetch(WORKER_URL + '/files/' + encodeURIComponent(fileId) + '/move', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ targetFolderId })
      });
      if (!r.ok) throw new Error('Move failed');
      toast('Moved'); loadFolder();
    } catch (e) { toast(e.message, 'error'); }
  };
}

// Start blank → create file in this folder and go to editor
async function createBlankFile() {
  if (!_folder) return;
  const name = await promptText('Name your file', 'e.g. "First cut" or "After feedback"', 'Untitled cut');
  if (!name) return;
  try {
    const r = await fetch(WORKER_URL + '/folders/' + encodeURIComponent(folderId) + '/files', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Create failed');
    window.location.href = 'editor.html?file=' + encodeURIComponent(data.file.id);
  } catch (e) {
    toast('Could not create file: ' + e.message, 'error');
  }
}

// Helpers
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
  );
}
function timeAgo(ts) {
  if (!ts) return 'just now';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  const d = Math.floor(s / 86400);
  if (d < 30) return d + ' day' + (d===1?'':'s') + ' ago';
  return new Date(ts).toLocaleDateString();
}
function toast(text, kind) {
  const el = document.createElement('div');
  el.className = 'toast' + (kind === 'error' ? ' error' : '');
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// Wire up
document.getElementById('cardStartBlank').onclick = createBlankFile;
document.getElementById('avatar').onclick = async () => {
  const newName = await promptText("What's your name?", 'This is how teammates will see you in the file list.', 'e.g. Girish', getUserName());
  if (newName) { setUserName(newName); updateAvatar(); }
};

// Boot
updateAvatar();
loadFolder();
</script>
