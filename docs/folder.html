<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project — Product Showcase</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAFA;
    --bg-card: #FFFFFF;
    --bg-subtle: #F4F5F7;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;
    --text: #111827;
    --text-dim: #6B7280;
    --text-faint: #9CA3AF;
    --accent: #0183FF;
    --accent-hover: #0166CC;
    --accent-soft: #E6F2FF;
    --danger: #EF4444;
    --danger-bg: #FEF2F2;
    --success: #10B981;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.04);
    --shadow-xl: 0 12px 32px rgba(0, 0, 0, 0.10), 0 4px 12px rgba(0, 0, 0, 0.06);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-logo {
    width: 32px; height: 32px;
    border-radius: 6px;
    display: block;
    object-fit: contain;
    flex: none;
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .back-link:hover { background: var(--bg-subtle); color: var(--text); }
  .breadcrumb {
    flex: 1;
    font-size: 14px;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
    overflow: hidden;
  }
  .breadcrumb .sep { color: var(--text-faint); }
  .breadcrumb .current {
    color: var(--text); font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: -0.01em;
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--bg-subtle); color: var(--text);
    border: 1px solid var(--border);
    font-weight: 600; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .avatar:hover {
    background: var(--accent-soft); border-color: var(--accent); color: var(--accent);
  }
  .btn-primary {
    background: var(--accent); color: white; border: none;
    border-radius: 6px; padding: 8px 14px;
    font: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .page { max-width: 1280px; margin: 0 auto; padding: 40px 32px 80px; }

  .header-row {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 28px;
    gap: 20px;
  }
  .header-text h1 {
    margin: 0 0 6px 0;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .header-text .meta {
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Hero "Start blank" card */
  .hero-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    display: flex;
    gap: 16px;
    align-items: center;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    margin-bottom: 40px;
    max-width: 540px;
    box-shadow: var(--shadow-sm);
  }
  .hero-card:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-lg);
    transform: translateY(-1px);
  }
  .hero-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex: none;
  }
  .hero-title {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 3px 0;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .hero-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin: 0;
  }

  .section-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    color: var(--text-faint); letter-spacing: 0.06em;
    margin: 0 0 14px 0;
  }

  .file-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .file-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    position: relative;
    box-shadow: var(--shadow-sm);
  }
  .file-card:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-lg);
    transform: translateY(-1px);
  }
  .file-thumb {
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #F4F5F7 0%, #E5E7EB 100%);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    font-size: 42px;
    font-weight: 700;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .file-body { padding: 14px 16px; }
  .file-name {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 4px 0;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.01em;
  }
  .file-meta {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .menu-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 28px; height: 28px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    opacity: 0;
    z-index: 2;
    box-shadow: var(--shadow-sm);
  }
  .file-card:hover .menu-btn { opacity: 1; }
  .menu-btn:hover { background: white; color: var(--text); border-color: var(--border-strong); }

  .empty {
    text-align: center;
    padding: 56px 20px;
    color: var(--text-dim);
    font-size: 14px;
    background: var(--bg-card);
    border: 1px dashed var(--border);
    border-radius: 10px;
  }
  .empty-title {
    font-size: 17px; font-weight: 600; color: var(--text);
    margin: 0 0 6px 0; letter-spacing: -0.01em;
  }
  .empty p { margin: 0; color: var(--text-dim); font-size: 14px; }
  .spinner {
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    width: 24px; height: 24px;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modals (matches index.html) */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(17, 24, 39, 0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    max-width: 440px; width: 100%;
    box-shadow: var(--shadow-xl);
  }
  .modal h2 {
    margin: 0 0 6px 0; font-size: 17px; font-weight: 600;
    color: var(--text); letter-spacing: -0.01em;
  }
  .modal p {
    margin: 0 0 18px 0; color: var(--text-dim);
    font-size: 14px; line-height: 1.5;
  }
  .modal input, .modal select {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font: inherit; font-size: 14px;
    margin-bottom: 18px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .modal input:focus, .modal select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(1, 131, 255, 0.12);
  }
  .modal input::placeholder { color: var(--text-faint); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button {
    background: white;
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 8px 16px;
    font: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .modal-actions button.primary {
    background: var(--accent); border-color: var(--accent); color: white;
  }
  .modal-actions button.primary:hover {
    background: var(--accent-hover); border-color: var(--accent-hover);
  }
  .modal-actions button:hover:not(.primary) {
    background: var(--bg-subtle); border-color: var(--border-strong);
  }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    z-index: 200;
    box-shadow: var(--shadow-xl);
    animation: slideIn 0.2s ease-out;
  }
  .toast.error { border-left: 3px solid var(--danger); padding-left: 14px; }
  .toast.success { border-left: 3px solid var(--success); padding-left: 14px; }
  @keyframes slideIn {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>

<div class="topbar">
  <img class="topbar-logo" src="assets/darwinbox-logo.svg" alt="Darwinbox">
  <a class="back-link" href="index.html" title="Back to projects">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Projects
  </a>
  <div class="breadcrumb">
    <span class="sep">/</span>
    <span class="current" id="folderName">Loading…</span>
  </div>
  <div class="topbar-right">
    <div class="avatar" id="avatar" title="Change name">?</div>
  </div>
</div>

<div class="page">

  <div class="header-row">
    <div class="header-text">
      <h1 id="folderHeading">Loading…</h1>
      <div class="meta" id="folderMeta"></div>
    </div>
  </div>

  <!-- New file from blank -->
  <div class="hero-card" id="cardStartBlank">
    <div class="hero-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M12 8v8M8 12h8"/>
      </svg>
    </div>
    <div>
      <div class="hero-title">Start from blank</div>
      <p class="hero-desc">Create a new editor file inside this project</p>
    </div>
  </div>

  <div class="section-title" id="filesHeading">Files in this project</div>
  <div id="fileGrid" class="file-grid">
    <div class="empty"><div class="spinner"></div>Loading…</div>
  </div>

</div>

<script>
const WORKER_URL = 'https://darwinbox-showcase-api.girishreddy262.workers.dev';

// Identity (localStorage; shared with projects.html)
function getUserName() {
  try { return localStorage.getItem('ps_user_name') || ''; } catch { return ''; }
}
function setUserName(name) { try { localStorage.setItem('ps_user_name', name); } catch {} }
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function updateAvatar() {
  const name = getUserName();
  const av = document.getElementById('avatar');
  av.textContent = initials(name);
  av.title = name ? `Signed in as ${name} — click to change` : 'Click to set your name';
}

function promptText(title, body, placeholder, defaultVal) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2>${escapeHtml(title)}</h2>
        <p>${escapeHtml(body)}</p>
        <input id="textInp" placeholder="${escapeHtml(placeholder || '')}" autofocus>
        <div class="modal-actions">
          <button id="cancel">Cancel</button>
          <button class="primary" id="ok">Continue</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#textInp');
    inp.value = defaultVal || '';
    inp.focus(); inp.select();
    const ok = () => {
      const v = inp.value.trim();
      if (!v) { inp.focus(); return; }
      overlay.remove(); resolve(v);
    };
    overlay.querySelector('#ok').onclick = ok;
    overlay.querySelector('#cancel').onclick = () => { overlay.remove(); resolve(null); };
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') ok();
      if (e.key === 'Escape') { overlay.remove(); resolve(null); }
    };
  });
}

// Load folder
const folderId = new URLSearchParams(window.location.search).get('id');
let _folder = null;
let _allFolders = null;

async function loadFolder() {
  if (!folderId) {
    document.getElementById('folderHeading').textContent = 'No project ID';
    document.getElementById('fileGrid').innerHTML = '<div class="empty"><p class="empty-title">Missing project ID</p><p>The URL needs ?id=PROJECT_ID</p></div>';
    return;
  }
  try {
    const r = await fetch(WORKER_URL + '/folders/' + encodeURIComponent(folderId));
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Failed to load');
    _folder = data.folder;
    renderFolder();
  } catch (e) {
    document.getElementById('folderHeading').textContent = 'Could not load project';
    document.getElementById('folderMeta').textContent = e.message;
    document.getElementById('fileGrid').innerHTML = '';
  }
}

function renderFolder() {
  document.getElementById('folderName').textContent = _folder.name || 'Untitled';
  document.getElementById('folderHeading').textContent = _folder.name || 'Untitled';
  document.title = (_folder.name || 'Project') + ' — Product Showcase';
  const fileCount = (_folder.files || []).length;
  document.getElementById('folderMeta').textContent =
    `${_folder.owner || 'unknown'} • ${fileCount} file${fileCount === 1 ? '' : 's'} • Updated ${timeAgo(_folder.updatedAt)}`;
  renderFiles();
}

function renderFiles() {
  const grid = document.getElementById('fileGrid');
  const files = _folder.files || [];
  document.getElementById('filesHeading').textContent =
    files.length ? `Files in this project (${files.length})` : 'Files in this project';
  if (files.length === 0) {
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <p class="empty-title">No files yet</p>
        <p>Click "Start from blank" above to create your first one</p>
      </div>`;
    return;
  }
  grid.innerHTML = files.map(fileCardHTML).join('');
  grid.querySelectorAll('.file-card').forEach(card => {
    card.onclick = (e) => {
      if (e.target.closest('.menu-btn')) return;
      const id = card.dataset.id;
      window.location.href = 'editor.html?file=' + encodeURIComponent(id);
    };
    const menu = card.querySelector('.menu-btn');
    if (menu) menu.onclick = (e) => {
      e.stopPropagation();
      openFileMenu(card.dataset.id, card.dataset.name);
    };
  });
}

function fileCardHTML(f) {
  const letter = (f.name || '?').trim().charAt(0).toUpperCase() || '?';
  return `
    <div class="file-card" data-id="${escapeHtml(f.id)}" data-name="${escapeHtml(f.name || '')}">
      <div class="file-thumb">
        <span>${escapeHtml(letter)}</span>
        <button class="menu-btn" title="More">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
      </div>
      <div class="file-body">
        <div class="file-name">${escapeHtml(f.name || 'Untitled')}</div>
        <div class="file-meta">
          ${f.lastEditor ? escapeHtml(f.lastEditor) + ' • ' : ''}Edited ${timeAgo(f.updatedAt)}
        </div>
      </div>
    </div>`;
}

async function openFileMenu(id, name) {
  const choice = prompt(`File: ${name}\n\nType:\n  R = rename\n  D = duplicate\n  M = move to another project\n  X = delete\n  (anything else to cancel)`);
  if (!choice) return;
  const c = choice.toUpperCase();
  if (c === 'R') {
    const newName = prompt('New name:', name);
    if (!newName || !newName.trim()) return;
    try {
      const r = await fetch(WORKER_URL + '/files/' + encodeURIComponent(id), {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName.trim() })
      });
      if (!r.ok) throw new Error('Rename failed');
      toast('Renamed'); loadFolder();
    } catch (e) { toast(e.message, 'error'); }
  } else if (c === 'D') {
    try {
      const r = await fetch(WORKER_URL + '/files/' + encodeURIComponent(id) + '/duplicate', { method: 'POST' });
      if (!r.ok) throw new Error('Duplicate failed');
      toast('Duplicated'); loadFolder();
    } catch (e) { toast(e.message, 'error'); }
  } else if (c === 'M') {
    moveFileFlow(id, name);
  } else if (c === 'X') {
    if (!confirm(`Delete "${name}"?`)) return;
    try {
      const r = await fetch(WORKER_URL + '/files/' + encodeURIComponent(id), { method: 'DELETE' });
      if (!r.ok) throw new Error('Delete failed');
      toast('Deleted'); loadFolder();
    } catch (e) { toast(e.message, 'error'); }
  }
}

async function moveFileFlow(fileId, fileName) {
  const user = getUserName();
  const ownerParam = user ? '?owner=' + encodeURIComponent(user) : '';
  let folders = [];
  try {
    const r = await fetch(WORKER_URL + '/folders' + ownerParam);
    const data = await r.json();
    if (r.ok && data.ok) {
      folders = [...(data.mine || []), ...(data.team || [])].filter(f => f.id !== folderId);
    }
  } catch {}
  if (folders.length === 0) {
    toast('No other projects to move into', 'error');
    return;
  }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>Move "${escapeHtml(fileName)}"</h2>
      <p>Pick a project to move this file into:</p>
      <select id="folderSelect">
        ${folders.map(f => `<option value="${escapeHtml(f.id)}">${escapeHtml(f.name)} (${escapeHtml(f.owner)})</option>`).join('')}
      </select>
      <div class="modal-actions">
        <button id="cancelMove">Cancel</button>
        <button class="primary" id="confirmMove">Move</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#cancelMove').onclick = () => overlay.remove();
  overlay.querySelector('#confirmMove').onclick = async () => {
    const targetFolderId = overlay.querySelector('#folderSelect').value;
    overlay.remove();
    try {
      const r = await fetch(WORKER_URL + '/files/' + encodeURIComponent(fileId) + '/move', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ targetFolderId })
      });
      if (!r.ok) throw new Error('Move failed');
      toast('Moved'); loadFolder();
    } catch (e) { toast(e.message, 'error'); }
  };
}

async function createBlankFile() {
  if (!_folder) return;
  const name = await promptText('Name your file', 'e.g. "First cut" or "After feedback"', 'Untitled cut');
  if (!name) return;
  try {
    const r = await fetch(WORKER_URL + '/folders/' + encodeURIComponent(folderId) + '/files', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Create failed');
    window.location.href = 'editor.html?file=' + encodeURIComponent(data.file.id);
  } catch (e) {
    toast('Could not create file: ' + e.message, 'error');
  }
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
  );
}
function timeAgo(ts) {
  if (!ts) return 'just now';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  const d = Math.floor(s / 86400);
  if (d < 30) return d + ' day' + (d===1?'':'s') + ' ago';
  return new Date(ts).toLocaleDateString();
}
function toast(text, kind) {
  const el = document.createElement('div');
  el.className = 'toast' + (kind === 'error' ? ' error' : (kind === 'success' ? ' success' : ''));
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

document.getElementById('cardStartBlank').onclick = createBlankFile;
document.getElementById('avatar').onclick = async () => {
  const newName = await promptText("What's your name?", 'This is how teammates will see you in the file list.', 'e.g. Girish', getUserName());
  if (newName) { setUserName(newName); updateAvatar(); }
};

updateAvatar();
loadFolder();
</script>
