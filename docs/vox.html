<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxScript</title>
<style>
  :root{
    --bg:#0b0b0d; --surface:#141416; --surface2:#1a1a1d; --surface3:#222226;
    --line:#1e1e22; --line2:#2c2c32; --text:#f0f0f2; --muted:#8a8a90; --faint:#5a5a60; --danger:#ff5b5b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  svg{display:block}
  .wrap{max-width:1100px;margin:0 auto;padding:22px 22px 60px}

  .top{display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;margin-right:6px}
  .logo{width:30px;height:30px;border-radius:6px;background:var(--surface3);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
  .brand b{font-size:15px;font-weight:600}
  .search{flex:1;min-width:180px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line2);border-radius:7px;padding:9px 12px}
  .search svg{color:var(--faint);flex:none}
  .search input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:inherit}
  .search input::placeholder{color:var(--faint)}
  .new{display:inline-flex;align-items:center;gap:7px;background:var(--text);border:none;color:var(--bg);border-radius:7px;padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;flex:none}
  .new:hover{filter:brightness(.92)} .new:active{transform:translateY(1px)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:12px;cursor:pointer;transition:border-color .15s,transform .08s,background .15s}
  .card:hover{border-color:var(--line2);transform:translateY(-2px);background:var(--surface2)}
  .thumb{height:120px;border-radius:7px;background:#000;border:1px solid var(--line);position:relative;overflow:hidden;display:flex;align-items:flex-end}
  .strip{display:flex;gap:1px;width:100%;height:38px;opacity:.6}
  .strip i{flex:1;background:linear-gradient(180deg,#26262b,#161618)}
  .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:rgba(240,240,242,.92);display:flex;align-items:center;justify-content:center}
  .ctitle{font-size:14.5px;font-weight:600;margin:13px 0 7px;line-height:1.35;word-break:break-word}
  .meta{color:var(--muted);font-size:12.5px}
  .actions{display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:11px;border-top:1px solid var(--line)}
  .open{display:inline-flex;align-items:center;gap:6px;background:var(--surface3);border:1px solid var(--line2);color:var(--text);border-radius:6px;padding:6px 13px;font-size:12.5px;font-weight:600;cursor:pointer}
  .open:hover{background:#2a2a30}
  .ic{background:transparent;border:none;color:var(--faint);border-radius:6px;padding:6px;cursor:pointer;display:inline-flex}
  .ic:hover{color:var(--text);background:var(--surface3)}
  .ic.del:hover{color:#fff;background:var(--danger)}

  .empty{grid-column:1/-1;border:1px dashed var(--line2);border-radius:10px;padding:64px 24px;text-align:center;color:var(--muted)}
  .empty .big{width:54px;height:54px;border-radius:9px;margin:0 auto 14px;background:var(--surface2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .empty h3{color:var(--text);margin:0 0 6px;font-size:18px;font-weight:600}
  .empty .mk{margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><div class="logo">V</div><b>VoxScript</b></div>
    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" type="text" placeholder="Search projects" autocomplete="off">
    </div>
    <button class="new" id="newBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> New project</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
  var VOX_PROJ_PREFIX='voxscript.proj.', VOX_PROJ_INDEX='voxscript.projects', EDITOR='editor-vox.html';
  var _q='';

  function readIndex(){ try{ return JSON.parse(localStorage.getItem(VOX_PROJ_INDEX)||'[]'); }catch(e){ return []; } }
  function writeIndex(ix){ try{ localStorage.setItem(VOX_PROJ_INDEX, JSON.stringify(ix)); }catch(e){ alert('Storage error: '+e.message); } }
  function newId(){ return 'vp_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function ago(iso){ try{
    var s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
    if(s<60)return 'just now'; var m=Math.floor(s/60); if(m<60)return m+' min ago';
    var h=Math.floor(m/60); if(h<24)return h+'h ago'; var d=Math.floor(h/24);
    if(d<7)return d+'d ago'; return new Date(iso).toLocaleDateString();
  }catch(e){ return ''; } }

  function createProject(){
    var id=newId(), now=new Date().toISOString();
    var ix=readIndex(); ix.push({id:id,name:'Untitled',createdAt:now,updatedAt:now,segments:0}); writeIndex(ix);
    location.href=EDITOR+'?vox='+encodeURIComponent(id);
  }
  function openProject(id){ location.href=EDITOR+'?vox='+encodeURIComponent(id); }
  function renameProject(id){
    var ix=readIndex(), p=ix.find(function(x){return x.id===id;}); if(!p)return;
    var name=prompt('Name this project', p.name||'Untitled'); if(name==null)return;
    name=name.trim()||'Untitled'; p.name=name; p.updatedAt=new Date().toISOString(); writeIndex(ix);
    try{ var raw=localStorage.getItem(VOX_PROJ_PREFIX+id); if(raw){ var pr=JSON.parse(raw); pr.payload=pr.payload||{}; pr.payload.module=pr.payload.module||{}; pr.payload.module.name=name; localStorage.setItem(VOX_PROJ_PREFIX+id, JSON.stringify(pr)); } }catch(e){}
    render();
  }
  function deleteProject(id){
    var ix=readIndex(), p=ix.find(function(x){return x.id===id;});
    if(!confirm('Delete "'+((p&&p.name)||'this project')+'"?'))return;
    writeIndex(ix.filter(function(x){return x.id!==id;}));
    try{ localStorage.removeItem(VOX_PROJ_PREFIX+id); }catch(e){}
    render();
  }

  var ICON={
    play:'<svg width="14" height="14" viewBox="0 0 24 24" fill="#0b0b0d"><path d="M8 5v14l11-7z"/></svg>',
    openplay:'<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
    edit:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
    trash:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>',
    mic:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v4"/></svg>'
  };

  function render(){
    var all=readIndex();
    var ix=all.slice().sort(function(a,b){return (b.updatedAt||'').localeCompare(a.updatedAt||'');});
    if(_q){ var q=_q.toLowerCase(); ix=ix.filter(function(p){return (p.name||'').toLowerCase().indexOf(q)>=0;}); }
    var grid=document.getElementById('grid'); grid.innerHTML='';

    if(!all.length){
      grid.innerHTML='<div class="empty"><div class="big">'+ICON.mic+'</div><h3>No projects yet</h3>'+
        '<div>Record your screen, then edit the words to cut the video.</div>'+
        '<div class="mk"><button class="new" id="mkBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> New project</button></div></div>';
      document.getElementById('mkBtn').onclick=createProject; return;
    }
    if(!ix.length){
      grid.innerHTML='<div class="empty"><h3 style="font-size:16px">No matches</h3><div>Nothing matches that search.</div></div>'; return;
    }
    ix.forEach(function(p){
      var seg=(p.segments||0), segTxt=seg+(seg===1?' clip':' clips');
      var card=document.createElement('div'); card.className='card';
      card.onclick=function(e){ if(e.target.closest('button'))return; openProject(p.id); };
      card.innerHTML=
        '<div class="thumb"><div class="play">'+ICON.play+'</div><div class="strip"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div></div>'+
        '<div class="ctitle"></div>'+
        '<div class="meta">'+segTxt+' · '+ago(p.updatedAt)+'</div>'+
        '<div class="actions"><button class="open">'+ICON.openplay+' Open</button>'+
          '<span style="display:flex;gap:4px">'+
          '<button class="ic" data-a="rename" aria-label="Rename">'+ICON.edit+'</button>'+
          '<button class="ic del" data-a="delete" aria-label="Delete">'+ICON.trash+'</button></span></div>';
      card.querySelector('.ctitle').textContent=p.name||'Untitled';
      card.querySelector('.open').onclick=function(){ openProject(p.id); };
      card.querySelector('[data-a="rename"]').onclick=function(){ renameProject(p.id); };
      card.querySelector('[data-a="delete"]').onclick=function(){ deleteProject(p.id); };
      grid.appendChild(card);
    });
  }

  document.getElementById('newBtn').onclick=createProject;
  var q=document.getElementById('q'); q.addEventListener('input', function(){ _q=q.value; render(); });
  window.addEventListener('focus', render);
  document.addEventListener('visibilitychange', function(){ if(!document.hidden) render(); });
  render();
</script>
</body>
</html>
