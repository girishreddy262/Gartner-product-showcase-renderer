<style>
  /* ────────────────────────────────────────
     Satoshi (loaded from existing Dropbox)
     ──────────────────────────────────────── */
  @font-face {
    font-family: 'Satoshi';
    font-weight: 400;
    src: url("https://dl.dropboxusercontent.com/scl/fi/o74clrkuslikwmeaytqb9/Satoshi-Regular.otf?rlkey=841n3aza1hrjcxd9khhovrdpa&dl=1") format('opentype');
  }
  @font-face {
    font-family: 'Satoshi';
    font-weight: 500;
    src: url("https://dl.dropboxusercontent.com/scl/fi/6ky69vt36s5luaiptrves/Satoshi-Medium.otf?rlkey=07wlgd3atxwqdprj3los485gt&dl=1") format('opentype');
  }
  @font-face {
    font-family: 'Satoshi';
    font-weight: 700;
    src: url("https://dl.dropboxusercontent.com/scl/fi/qlodxfd6vcekictpctle4/Satoshi-Bold.otf?rlkey=b9rw1asm3wyqfib7zxcsakjr7&dl=1") format('opentype');
  }
  @font-face {
    font-family: 'Satoshi';
    font-weight: 900;
    src: url("https://dl.dropboxusercontent.com/scl/fi/3q5thnvcwxg1cgzjh9e1p/Satoshi-Black.otf?rlkey=2nz2kno81tqp3qu0jai78qkr0&dl=1") format('opentype');
  }

  :root {
    --bg: #0B0F17;
    --bg-card: #131927;
    --bg-card-hover: #1A2336;
    --border: #1E2A40;
    --border-strong: #2A3A55;
    --text: #FFFFFF;
    --text-dim: #8B96AD;
    --text-faint: #5A647C;
    --accent: #0183FF;
    --accent-hover: #2196FF;
    --navy-deep: #003B73;
    --warning: #FFB454;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Satoshi', system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    height: 100%;
  }

  /* ────── Top bar ────── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .search {
    flex: 1;
    max-width: 720px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    transition: border-color 0.15s;
  }
  .search:focus-within { border-color: var(--border-strong); }
  .search svg { color: var(--text-faint); flex: none; }
  .search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
  }
  .search kbd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11px;
    color: var(--text-faint);
    font-family: inherit;
  }

  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-weight: 700;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .avatar:hover { background: var(--accent-hover); }

  .btn-new {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-new:hover { background: var(--bg-card-hover); border-color: var(--accent); }
  .btn-new svg { color: var(--text-dim); }

  /* ────── Layout ────── */
  .page { max-width: 1400px; margin: 0 auto; padding: 40px 32px 80px; }

  /* ────── Hero cards (Create / Upload) ────── */
  .hero-grid {
    display: flex;
    justify-content: center;
    margin: 0 auto 64px auto;
  }
  .hero-grid .hero-card {
    max-width: 480px;
    width: 100%;
  }
  .hero-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .hero-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .hero-card.featured {
    background: linear-gradient(135deg, #003B73 0%, #0183FF 100%);
    border-color: transparent;
  }
  .hero-card.featured:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(1, 131, 255, 0.3);
  }
  .hero-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    display: flex; align-items: center; justify-content: center;
    flex: none;
  }
  .hero-card.featured .hero-icon { background: rgba(255, 255, 255, 0.15); }
  .hero-text { flex: 1; }
  .hero-title {
    font-size: 17px;
    font-weight: 700;
    margin: 0 0 4px 0;
    display: flex; align-items: center; gap: 8px;
  }
  .badge-new {
    background: rgba(255, 255, 255, 0.2);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }
  .hero-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
    margin: 0;
  }
  .hero-card.featured .hero-desc { color: rgba(255, 255, 255, 0.9); }

  /* ────── Section header ────── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 0 18px 0;
  }
  .section-header h2 {
    font-size: 22px;
    font-weight: 700;
    margin: 0;
    color: var(--text);
  }
  .section-header .count {
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 500;
  }

  /* ────── Project grid ────── */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
    margin-bottom: 56px;
  }

  .project-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .project-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .project-thumb {
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #1A2740 0%, #0B1426 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-size: 48px;
    font-weight: 900;
    position: relative;
  }
  .project-thumb .placeholder-letter {
    color: rgba(1, 131, 255, 0.3);
  }

  .project-body { padding: 14px 16px; }
  .project-title {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 4px 0;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .project-meta {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .project-meta .dot { color: var(--text-faint); }

  .menu-btn {
    position: absolute;
    top: 10px; right: 10px;
    width: 28px; height: 28px;
    border-radius: 6px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    cursor: pointer;
    opacity: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }
  .project-card:hover .menu-btn { opacity: 1; }
  .menu-btn:hover { background: rgba(0, 0, 0, 0.8); }

  /* ────── Empty + loading states ────── */
  .empty, .loading {
    text-align: center;
    padding: 64px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }
  .empty-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 8px 0;
  }
  .spinner {
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    width: 32px; height: 32px;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ────── Modal (name picker + new project) ────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    padding: 28px;
    max-width: 440px;
    width: 100%;
  }
  .modal h2 {
    margin: 0 0 6px 0;
    font-size: 20px;
    font-weight: 700;
  }
  .modal p {
    margin: 0 0 18px 0;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.5;
  }
  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    margin-bottom: 16px;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .modal-actions button {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .modal-actions button.primary {
    background: var(--accent);
    border-color: var(--accent);
  }
  .modal-actions button.primary:hover { background: var(--accent-hover); }
  .modal-actions button:hover { background: var(--bg-card-hover); }

  /* ────── Toast ────── */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 12px 18px;
    color: var(--text);
    font-size: 14px;
    z-index: 200;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: slideIn 0.2s ease-out;
  }
  .toast.error { border-color: #FF6B6B; }
  @keyframes slideIn {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>

<div class="topbar">
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"/>

    <kbd>⌘K</kbd>
  </div>

      New project
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>

</div>

<div class="page">

  <!-- Hero "what do you want to do" card -->
  <div class="hero-grid">
    <div class="hero-card" id="cardBlank">
      <div class="hero-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M12 8v8M8 12h8"/>

      </div>
      <div class="hero-text">

  </div>

  <!-- Team -->
  <div class="section-header">
    <h2>Team projects</h2>
    <span class="count" id="teamCount"></span>
  </div>
  <div id="teamGrid" class="project-grid">
    <div class="loading"><div class="spinner"></div>Loading…</div>
  </div>

</div>

<script>
const WORKER_URL = 'https://darwinbox-showcase-api.girishreddy262.workers.dev';

// ─── Identity (localStorage) ───
function getUserName() {
  return localStorage.getItem('ps_user_name') || '';
}
function setUserName(name) {
  localStorage.setItem('ps_user_name', name);
}
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

async function ensureUserName() {
  let name = getUserName();
  if (name) return name;
  name = await promptName();
  if (name) { setUserName(name); return name; }
  return null;
}

function promptName() {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2>What's your name?</h2>
        <p>This is how your teammates will see who created which project. You can change it later.</p>
        <input id="nameInput" placeholder="e.g. Girish" autofocus>
        <div class="modal-actions">
          <button class="primary" id="nameOk">Continue</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#nameInput');
    inp.value = getUserName() || '';
    inp.focus();
    inp.select();
    const ok = () => {
      const v = inp.value.trim();
      if (!v) { inp.focus(); return; }
      overlay.remove();
      resolve(v);
    };
    overlay.querySelector('#nameOk').onclick = ok;
    inp.onkeydown = (e) => { if (e.key === 'Enter') ok(); };
  });
}

function updateAvatar() {
  const name = getUserName();
  document.getElementById('avatar').textContent = initials(name);
  document.getElementById('avatar').title = name ? `Signed in as ${name} — click to change` : 'Click to set your name';
}

// ─── New project ───
async function createNewProject() {
  const user = await ensureUserName();
  if (!user) return;
  const name = await promptProjectName();
  if (!name) return;
  toast('Creating project…');
  try {
    // v3.28b.14: create FOLDER, not single project. Land on folder.html.
    const r = await fetch(WORKER_URL + '/folders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, owner: user })
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Create failed');
    window.location.href = 'folder.html?id=' + encodeURIComponent(data.folder.id);
  } catch (e) {
    toast('Could not create project: ' + e.message, 'error');
  }
}

function promptProjectName() {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2>New project</h2>
        <p>Give your project a memorable name. You can rename it any time.</p>
        <input id="projName" placeholder="e.g. Gartner Q2 demo" autofocus>
        <div class="modal-actions">
          <button id="cancel">Cancel</button>
          <button class="primary" id="ok">Create</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#projName');
    inp.focus();
    const ok = () => {
      const v = inp.value.trim();
      if (!v) { inp.focus(); return; }
      overlay.remove();
      resolve(v);
    };
    overlay.querySelector('#ok').onclick = ok;
    overlay.querySelector('#cancel').onclick = () => { overlay.remove(); resolve(null); };
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') ok();
      if (e.key === 'Escape') { overlay.remove(); resolve(null); }
    };
  });
}

// ─── Load + render projects list ───
async function loadProjects() {
  const user = getUserName();
  const ownerParam = user ? '?owner=' + encodeURIComponent(user) : '';
  try {
    // v3.28b.14: use /folders endpoint
    const r = await fetch(WORKER_URL + '/folders' + ownerParam);
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Failed to load');
    renderProjects('mineGrid', data.mine || [], 'mineCount', user);
    renderProjects('teamGrid', data.team || [], 'teamCount', user);
  } catch (e) {
    document.getElementById('mineGrid').innerHTML = '<div class="empty"><p class="empty-title">Could not load projects</p><p>' + escapeHtml(e.message) + '</p></div>';
    document.getElementById('teamGrid').innerHTML = '';
  }
}

function renderProjects(gridId, list, countId, currentUser) {
  const grid = document.getElementById(gridId);
  const countEl = document.getElementById(countId);
  countEl.textContent = list.length ? `${list.length} project${list.length === 1 ? '' : 's'}` : '';
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty">
      <p class="empty-title">No projects yet</p>
      <p>${gridId === 'mineGrid' ? "Click 'New project' above to get started" : "Other teammates haven't created any projects yet"}</p>
    </div>`;
    grid.style.gridTemplateColumns = '1fr';
    return;
  }
  grid.style.gridTemplateColumns = '';
  grid.innerHTML = list.map(p => projectCardHTML(p)).join('');
  // Attach click handlers
  grid.querySelectorAll('.project-card').forEach(card => {
    card.onclick = (e) => {
      if (e.target.closest('.menu-btn')) return;
      const id = card.dataset.id;
      // v3.28b.14: cards open folder view, not editor
      window.location.href = 'folder.html?id=' + encodeURIComponent(id);
    };
    const menu = card.querySelector('.menu-btn');
    if (menu) menu.onclick = (e) => {
      e.stopPropagation();
      openCardMenu(card.dataset.id, card.dataset.owner, card.dataset.name);
    };
  });
}

function projectCardHTML(p) {
  const letter = (p.name || '?').trim().charAt(0).toUpperCase() || '?';
  const fileCount = p.fileCount != null ? p.fileCount : 0;
  const fileLabel = fileCount === 1 ? '1 file' : `${fileCount} files`;
  return `
    <div class="project-card" data-id="${escapeHtml(p.id)}" data-owner="${escapeHtml(p.owner || '')}" data-name="${escapeHtml(p.name || '')}">
      <div class="project-thumb">
        <span class="placeholder-letter">${escapeHtml(letter)}</span>
        <button class="menu-btn" title="More">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
      </div>
      <div class="project-body">
        <div class="project-title">${escapeHtml(p.name || 'Untitled')}</div>
        <div class="project-meta">
          <span>${escapeHtml(p.owner || 'unknown')}</span>
          <span class="dot">•</span>
          <span>${fileLabel}</span>
          <span class="dot">•</span>
          <span>${timeAgo(p.updatedAt)}</span>
        </div>
      </div>
    </div>`;
}

// Rename / delete menu (folders)
function openCardMenu(id, owner, name) {
  const choice = prompt(`Project: ${name}\nOwner: ${owner}\n\nType:\n  R = rename\n  D = delete\n  (anything else to cancel)`);
  if (!choice) return;
  if (choice.toUpperCase() === 'R') {
    const newName = prompt('New name:', name);
    if (!newName || !newName.trim()) return;
    fetch(WORKER_URL + '/folders/' + encodeURIComponent(id), {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName.trim() })
    }).then(r => r.json()).then(() => loadProjects()).catch(e => toast('Rename failed: ' + e.message, 'error'));
  } else if (choice.toUpperCase() === 'D') {
    if (!confirm(`Delete "${name}" and all files inside it?`)) return;
    fetch(WORKER_URL + '/folders/' + encodeURIComponent(id), { method: 'DELETE' })
      .then(r => r.json()).then(() => { toast('Deleted'); loadProjects(); })
      .catch(e => toast('Delete failed: ' + e.message, 'error'));
  }
}

// ─── Helpers ───
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
  );
}
function timeAgo(ts) {
  if (!ts) return 'just now';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  const d = Math.floor(s / 86400);
  if (d < 30) return d + ' day' + (d===1?'':'s') + ' ago';
  return new Date(ts).toLocaleDateString();
}
function toast(text, kind) {
  const el = document.createElement('div');
  el.className = 'toast' + (kind === 'error' ? ' error' : '');
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── Search filter ───
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.project-card').forEach(card => {
    const name = (card.dataset.name || '').toLowerCase();
    const owner = (card.dataset.owner || '').toLowerCase();
    card.style.display = (!q || name.includes(q) || owner.includes(q)) ? '' : 'none';
  });
});
// Cmd+K → focus search
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ─── Wire buttons ───
document.getElementById('btnNewProject').onclick = createNewProject;
document.getElementById('cardBlank').onclick = createNewProject;
document.getElementById('avatar').onclick = async () => {
  const newName = await promptName();
  if (newName) { setUserName(newName); updateAvatar(); loadProjects(); }
};

// ─── Boot ───
// v3.28b.12: Don't prompt for name on page load. The name is only needed when the
// user creates a project or wants to filter "my projects". If they're just browsing
// the team projects there's no reason to interrupt them with a modal.
(async function init() {
  updateAvatar();
  loadProjects();
})();
</script>
