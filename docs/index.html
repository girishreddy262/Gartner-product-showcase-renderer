<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects — Product Showcase Editor</title>
<style>
  :root {
    --bg: #0B0F17;
    --bg-card: #131927;
    --bg-card-hover: #1A2336;
    --border: #1E2A40;
    --border-strong: #2A3A55;
    --text: #FFFFFF;
    --text-dim: #8B96AD;
    --text-faint: #5A647C;
    --accent: #0183FF;
    --accent-hover: #2196FF;
    --danger: #FF5C5C;
    --danger-bg: rgba(255, 92, 92, 0.12);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-brand {
    flex: 1; font-size: 15px; font-weight: 700; color: var(--text);
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--accent); color: white;
    font-weight: 700; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .avatar:hover { background: var(--accent-hover); }
  .btn-primary {
    background: var(--accent); color: white; border: none;
    border-radius: 10px; padding: 10px 18px;
    font: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .page { max-width: 1400px; margin: 0 auto; padding: 32px 32px 80px; }
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; gap: 20px;
  }
  .header-row h1 { margin: 0; font-size: 28px; font-weight: 700; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .card-thumb {
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #1A2740 0%, #0B1426 100%);
    display: flex; align-items: center; justify-content: center;
    color: rgba(1, 131, 255, 0.3);
    font-size: 42px; font-weight: 900;
    position: relative;
  }
  .card-body { padding: 12px 14px; }
  .card-name {
    font-size: 14px; font-weight: 700; margin: 0 0 4px 0;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 12px; color: var(--text-dim);
  }
  .menu-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 30px; height: 30px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    opacity: 0;
    z-index: 2;
  }
  .card:hover .menu-btn,
  .menu-btn:focus,
  .menu-btn.open { opacity: 1; }
  .menu-btn:hover { background: rgba(0, 0, 0, 0.85); }

  /* Dropdown menu attached to the card */
  .menu-popup {
    position: absolute;
    top: 44px; right: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    min-width: 140px;
    overflow: hidden;
    z-index: 10;
  }
  .menu-popup button {
    display: block; width: 100%;
    background: none; border: none;
    color: var(--text);
    text-align: left;
    padding: 10px 14px;
    font: inherit; font-size: 13px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .menu-popup button:hover { background: var(--bg-card-hover); }
  .menu-popup button.danger { color: var(--danger); }
  .menu-popup button.danger:hover { background: var(--danger-bg); }

  /* Empty / loading / error states */
  .empty {
    text-align: center;
    padding: 56px 20px;
    color: var(--text-dim);
    font-size: 14px;
    background: var(--bg-card);
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .empty-title {
    font-size: 18px; font-weight: 700;
    color: var(--text); margin: 0 0 8px 0;
  }
  .spinner {
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    width: 28px; height: 28px;
    animation: spin 1s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    padding: 24px 28px;
    max-width: 440px; width: 100%;
  }
  .modal h2 { margin: 0 0 8px 0; font-size: 18px; font-weight: 700; }
  .modal p { margin: 0 0 18px 0; color: var(--text-dim); font-size: 14px; line-height: 1.5; }
  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font: inherit; font-size: 15px;
    margin-bottom: 16px;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 10px 18px;
    font: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .modal-actions button.primary { background: var(--accent); border-color: var(--accent); }
  .modal-actions button.primary:hover { background: var(--accent-hover); }
  .modal-actions button.danger { background: var(--danger); border-color: var(--danger); }
  .modal-actions button.danger:hover { background: #FF7575; }
  .modal-actions button:hover:not(.primary):not(.danger) { background: var(--bg-card-hover); }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 12px 18px;
    color: var(--text);
    font-size: 14px;
    z-index: 200;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    animation: slideIn 0.2s ease-out;
  }
  .toast.error { border-color: var(--danger); }
  .toast.success { border-color: #58D68D; }
  @keyframes slideIn {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .section-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    color: var(--text-dim); letter-spacing: 0.5px;
    margin: 32px 0 14px 0;
  }
  .section-title:first-of-type { margin-top: 8px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">Darwinbox Product Showcase</div>
  <button class="btn-primary" id="btnNewProject">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    New project
  </button>
  <div class="avatar" id="avatar" title="Change name">?</div>
</div>

<div class="page">
  <div class="header-row">
    <h1>Projects</h1>
  </div>

  <div class="section-title" id="mineTitle">My projects</div>
  <div id="mineGrid" class="grid">
    <div class="empty" style="grid-column:1/-1"><div class="spinner"></div>Loading…</div>
  </div>

  <div class="section-title" id="teamTitle" style="display:none;">Team projects</div>
  <div id="teamGrid" class="grid"></div>
</div>

<script>
const WORKER_URL = 'https://darwinbox-showcase-api.girishreddy262.workers.dev';

// ── Identity ──
function getUserName() {
  try { return localStorage.getItem('ps_user_name') || ''; } catch { return ''; }
}
function setUserName(name) { try { localStorage.setItem('ps_user_name', name); } catch {} }
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function updateAvatar() {
  const name = getUserName();
  const av = document.getElementById('avatar');
  av.textContent = initials(name);
  av.title = name ? `Signed in as ${name} — click to change` : 'Click to set your name';
}

// ── Modal helpers ──
function promptText(title, body, placeholder, defaultVal) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2>${escapeHtml(title)}</h2>
        <p>${escapeHtml(body)}</p>
        <input id="textInp" placeholder="${escapeHtml(placeholder || '')}" autofocus>
        <div class="modal-actions">
          <button id="cancel">Cancel</button>
          <button class="primary" id="ok">Continue</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#textInp');
    inp.value = defaultVal || '';
    inp.focus(); inp.select();
    const ok = () => {
      const v = inp.value.trim();
      if (!v) { inp.focus(); return; }
      overlay.remove(); resolve(v);
    };
    overlay.querySelector('#ok').onclick = ok;
    overlay.querySelector('#cancel').onclick = () => { overlay.remove(); resolve(null); };
    overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); resolve(null); } });
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') ok();
      if (e.key === 'Escape') { overlay.remove(); resolve(null); }
    };
  });
}

function confirmDanger(title, body, dangerLabel) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2>${escapeHtml(title)}</h2>
        <p>${escapeHtml(body)}</p>
        <div class="modal-actions">
          <button id="cancel">Cancel</button>
          <button class="danger" id="confirm">${escapeHtml(dangerLabel || 'Delete')}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#confirm').onclick = () => { overlay.remove(); resolve(true); };
    overlay.querySelector('#cancel').onclick = () => { overlay.remove(); resolve(false); };
    overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } });
    overlay.querySelector('#confirm').focus();
  });
}

function toast(text, kind) {
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' ' + kind : '');
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Data loading ──
let _mine = [];
let _team = [];

async function loadProjects() {
  const user = getUserName();
  const ownerParam = user ? '?owner=' + encodeURIComponent(user) : '';
  const mineGrid = document.getElementById('mineGrid');
  const teamGrid = document.getElementById('teamGrid');
  const teamTitle = document.getElementById('teamTitle');
  try {
    const r = await fetch(WORKER_URL + '/folders' + ownerParam);
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Failed to load');
    _mine = data.mine || [];
    _team = data.team || [];
    renderGrid(mineGrid, _mine, 'You have no projects yet. Click <strong>+ New project</strong> to start one.');
    if (_team.length > 0) {
      teamTitle.style.display = '';
      renderGrid(teamGrid, _team, '');
    } else {
      teamTitle.style.display = 'none';
      teamGrid.innerHTML = '';
    }
  } catch (e) {
    mineGrid.innerHTML = `<div class="empty" style="grid-column:1/-1"><p class="empty-title">Could not load projects</p><p>${escapeHtml(e.message)}</p></div>`;
  }
}

function renderGrid(container, items, emptyHtml) {
  if (!items.length) {
    if (emptyHtml) {
      container.innerHTML = `<div class="empty" style="grid-column:1/-1"><p class="empty-title">No projects</p><p>${emptyHtml}</p></div>`;
    } else {
      container.innerHTML = '';
    }
    return;
  }
  container.innerHTML = items.map(cardHTML).join('');
  // Wire up clicks
  container.querySelectorAll('.card').forEach(card => {
    card.onclick = (e) => {
      if (e.target.closest('.menu-btn') || e.target.closest('.menu-popup')) return;
      const id = card.dataset.id;
      window.location.href = 'folder.html?id=' + encodeURIComponent(id);
    };
    const menuBtn = card.querySelector('.menu-btn');
    if (menuBtn) {
      menuBtn.onclick = (e) => {
        e.stopPropagation();
        e.preventDefault();
        openMenu(card);
      };
    }
  });
}

function cardHTML(p) {
  const letter = (p.name || '?').trim().charAt(0).toUpperCase() || '?';
  return `
    <div class="card" data-id="${escapeHtml(p.id)}" data-name="${escapeHtml(p.name || '')}">
      <div class="card-thumb">
        <span>${escapeHtml(letter)}</span>
        <button class="menu-btn" title="More" aria-label="Project actions">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
          </svg>
        </button>
      </div>
      <div class="card-body">
        <div class="card-name">${escapeHtml(p.name || 'Untitled')}</div>
        <div class="card-meta">
          ${escapeHtml(p.owner || 'unknown')} • ${p.fileCount || 0} file${(p.fileCount||0)===1?'':'s'} • ${timeAgo(p.updatedAt)}
        </div>
      </div>
    </div>`;
}

// ── Card action menu ──
function closeAllMenus() {
  document.querySelectorAll('.menu-popup').forEach(m => m.remove());
  document.querySelectorAll('.menu-btn.open').forEach(b => b.classList.remove('open'));
}

function openMenu(card) {
  closeAllMenus();
  const id = card.dataset.id;
  const name = card.dataset.name;
  const menuBtn = card.querySelector('.menu-btn');
  menuBtn.classList.add('open');

  const popup = document.createElement('div');
  popup.className = 'menu-popup';
  popup.innerHTML = `
    <button data-action="rename">Rename</button>
    <button data-action="delete" class="danger">Delete</button>
  `;
  card.appendChild(popup);

  popup.querySelectorAll('button').forEach(b => {
    b.onclick = async (e) => {
      e.stopPropagation();
      const action = b.dataset.action;
      closeAllMenus();
      if (action === 'rename') await renameProject(id, name);
      else if (action === 'delete') await deleteProject(id, name);
    };
  });

  // Click outside closes
  setTimeout(() => {
    const handler = (e) => {
      if (!popup.contains(e.target) && !menuBtn.contains(e.target)) {
        closeAllMenus();
        document.removeEventListener('click', handler);
      }
    };
    document.addEventListener('click', handler);
  }, 0);
}

async function renameProject(id, currentName) {
  const newName = await promptText('Rename project', 'Give this project a new name.', 'Project name', currentName);
  if (!newName) return;
  try {
    const r = await fetch(WORKER_URL + '/folders/' + encodeURIComponent(id), {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName })
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok || !data.ok) throw new Error(data.error || ('HTTP ' + r.status));
    toast('Project renamed', 'success');
    loadProjects();
  } catch (e) {
    toast('Rename failed: ' + e.message, 'error');
  }
}

async function deleteProject(id, name) {
  const ok = await confirmDanger(
    'Delete this project?',
    `"${name}" and all its files will be deleted. This can't be undone from here.`,
    'Delete project'
  );
  if (!ok) return;
  // Optimistic UI: remove from grid immediately
  const card = document.querySelector(`.card[data-id="${cssEscape(id)}"]`);
  if (card) card.style.opacity = '0.4';
  try {
    const r = await fetch(WORKER_URL + '/folders/' + encodeURIComponent(id), { method: 'DELETE' });
    const data = await r.json().catch(() => ({}));
    if (!r.ok || !data.ok) {
      // Try legacy fallback (old projects might be under /projects/:id)
      const r2 = await fetch(WORKER_URL + '/projects/' + encodeURIComponent(id), { method: 'DELETE' });
      const data2 = await r2.json().catch(() => ({}));
      if (!r2.ok || !data2.ok) throw new Error(data.error || data2.error || ('HTTP ' + r.status));
    }
    toast('Project deleted', 'success');
    loadProjects();
  } catch (e) {
    if (card) card.style.opacity = '';
    toast('Delete failed: ' + e.message, 'error');
  }
}

// ── New project ──
async function createNewProject() {
  const name = await promptText(
    'New project',
    'Each project can hold multiple cuts of your showcase video.',
    'e.g. Q2 Gartner showcase',
    ''
  );
  if (!name) return;
  const owner = getUserName() || 'anonymous';
  if (!getUserName()) {
    const who = await promptText("What's your name?", 'This is how teammates will see you in the project list.', 'e.g. Girish', '');
    if (who) { setUserName(who); updateAvatar(); }
  }
  try {
    const r = await fetch(WORKER_URL + '/folders', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, owner: getUserName() || owner })
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Create failed');
    window.location.href = 'folder.html?id=' + encodeURIComponent(data.folder.id);
  } catch (e) {
    toast('Could not create project: ' + e.message, 'error');
  }
}

// ── Helpers ──
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
  );
}
function cssEscape(s) {
  return String(s).replace(/"/g, '\\"');
}
function timeAgo(ts) {
  if (!ts) return 'just now';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  const d = Math.floor(s / 86400);
  if (d < 30) return d + ' day' + (d===1?'':'s') + ' ago';
  return new Date(ts).toLocaleDateString();
}

// Wire up
document.getElementById('btnNewProject').onclick = createNewProject;
document.getElementById('avatar').onclick = async () => {
  const newName = await promptText("What's your name?", 'This is how teammates will see you in the project list.', 'e.g. Girish', getUserName());
  if (newName) { setUserName(newName); updateAvatar(); loadProjects(); }
};

// Boot
updateAvatar();
loadProjects();
</script>

</body>
</html>
