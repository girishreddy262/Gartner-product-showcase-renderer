name: Render Product Showcase

on:
  repository_dispatch:
    types: [render-showcase]

  workflow_dispatch:
    inputs:
      payload_json:
        description: 'Base64-encoded payload JSON'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode payload
        id: payload
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload) }}' > render-payload.json
            JOB_ID=$(cat render-payload.json | jq -r '.jobId // "unknown"')
          else
            echo "${{ inputs.payload_json }}" | base64 -d > render-payload.json
            JOB_ID=$(cat render-payload.json | jq -r '.jobId // "unknown"')
          fi
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "📦 Payload decoded for job: $JOB_ID"
          cat render-payload.json | jq '{
            module: .module.name,
            segments: (.segments | length),
            callouts: (.callouts | length),
            textOverlays: (.textOverlays | length),
            effects: (.effects | length),
            audioPlacements: (.audioPlacements | length)
          }'

      - name: Render via Lambda
        run: npx tsx src/render.ts render-payload.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          REMOTION_REGION: us-east-1

      - name: Read render result
        id: result
        run: |
          if [ -f "out/render-result.json" ]; then
            MP4_URL=$(cat out/render-result.json | jq -r '.mp4Url // ""')
            echo "mp4_url=$MP4_URL" >> "$GITHUB_OUTPUT"
            echo "📹 Output URL: $MP4_URL"
          else
            echo "mp4_url=" >> "$GITHUB_OUTPUT"
            echo "⚠️ No render result file found"
          fi

      - name: Notify n8n (callback)
        if: always()
        run: |
          JOB_ID="${{ steps.payload.outputs.job_id }}"
          STATUS="${{ job.status }}"
          CALLBACK_URL="${{ github.event.client_payload.callbackUrl || '' }}"
          MP4_URL="${{ steps.result.outputs.mp4_url || '' }}"
          ARTIFACT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -n "$CALLBACK_URL" ]; then
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"jobId\": \"$JOB_ID\",
                \"status\": \"$STATUS\",
                \"mp4Url\": \"$MP4_URL\",
                \"artifactUrl\": \"$ARTIFACT_URL\"
              }" || echo "⚠️ Callback failed (non-fatal)"
          fi
          echo "📤 Render $STATUS for job $JOB_ID"
