name: Render Product Showcase

on:
  repository_dispatch:
    types: [render-showcase]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      payload_json:
        description: 'Base64-encoded payload JSON'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome dependencies
        run: npx remotion browser ensure

      - name: Decode payload
        id: payload
        run: |
          # From repository_dispatch: client_payload IS the render payload directly
          # (jobId, module, videos, segments, callouts, effects, textOverlays, callbackUrl)
          # From workflow_dispatch: payload is base64-encoded input
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJson(github.event.client_payload) }}' > render-payload.json
            JOB_ID=$(cat render-payload.json | jq -r '.jobId // "unknown"')
          else
            echo "${{ inputs.payload_json }}" | base64 -d > render-payload.json
            JOB_ID=$(cat render-payload.json | jq -r '.jobId // "unknown"')
          fi
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "📦 Payload decoded for job: $JOB_ID"
          cat render-payload.json | jq '{
            module: .module.name,
            segments: (.segments | length),
            callouts: (.callouts | length),
            textOverlays: (.textOverlays | length),
            effects: (.effects | length),
            audioPlacements: (.audioPlacements | length)
          }'

      - name: Render video
        run: npx tsx src/render.ts render-payload.json out/showcase-${{ steps.payload.outputs.job_id }}.mp4
        env:
          REMOTION_PAYLOAD: $(cat render-payload.json)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: showcase-${{ steps.payload.outputs.job_id }}
          path: out/showcase-${{ steps.payload.outputs.job_id }}.mp4
          retention-days: 7

      - name: Upload to Dropbox
        id: dropbox
        if: success()
        run: |
          JOB_ID="${{ steps.payload.outputs.job_id }}"
          MP4_FILE="out/showcase-${JOB_ID}.mp4"
          DROPBOX_PATH="/ProductShowcaseTemp/${JOB_ID}/showcase-${JOB_ID}.mp4"

          if [ ! -f "$MP4_FILE" ]; then
            echo "❌ MP4 file not found: $MP4_FILE"
            echo "dropbox_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get fresh access token using refresh token
          TOKEN_RESPONSE=$(curl -s -X POST https://api.dropboxapi.com/oauth2/token \
            -d grant_type=refresh_token \
            -d "refresh_token=${{ secrets.DROPBOX_REFRESH_TOKEN }}" \
            -d "client_id=${{ secrets.DROPBOX_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.DROPBOX_CLIENT_SECRET }}")
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Failed to get Dropbox access token"
            echo "$TOKEN_RESPONSE"
            echo "dropbox_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FILE_SIZE=$(stat -c%s "$MP4_FILE")
          echo "📤 Uploading ${FILE_SIZE} bytes to Dropbox: ${DROPBOX_PATH}"

          # Upload file (up to 150MB via single upload)
          UPLOAD_RESPONSE=$(curl -s -X POST https://content.dropboxapi.com/2/files/upload \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            -H "Dropbox-API-Arg: {\"path\":\"${DROPBOX_PATH}\",\"mode\":\"overwrite\",\"autorename\":false,\"mute\":false}" \
            --data-binary "@${MP4_FILE}")

          UPLOADED_PATH=$(echo "$UPLOAD_RESPONSE" | jq -r '.path_display // empty')
          if [ -z "$UPLOADED_PATH" ]; then
            echo "❌ Dropbox upload failed"
            echo "$UPLOAD_RESPONSE"
            echo "dropbox_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "✅ Uploaded to: $UPLOADED_PATH"

          # Create shared link
          SHARE_RESPONSE=$(curl -s -X POST https://api.dropboxapi.com/2/sharing/create_shared_link_with_settings \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"path\":\"${UPLOADED_PATH}\",\"settings\":{\"requested_visibility\":\"public\",\"audience\":\"public\",\"access\":\"viewer\"}}")

          SHARE_URL=$(echo "$SHARE_RESPONSE" | jq -r '.url // empty')
          # Handle case where link already exists
          if [ -z "$SHARE_URL" ]; then
            SHARE_URL=$(echo "$SHARE_RESPONSE" | jq -r '.error.shared_link_already_exists.metadata.url // empty')
          fi

          if [ -z "$SHARE_URL" ]; then
            echo "❌ Failed to create share link"
            echo "$SHARE_RESPONSE"
            echo "dropbox_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Convert to direct download URL
          DIRECT_URL=$(echo "$SHARE_URL" | sed 's|www.dropbox.com|dl.dropboxusercontent.com|' | sed 's|dl=0|dl=1|')
          if ! echo "$DIRECT_URL" | grep -q "dl=1"; then
            DIRECT_URL="${DIRECT_URL}$(echo "$DIRECT_URL" | grep -q '?' && echo '&' || echo '?')dl=1"
          fi

          echo "🔗 Direct URL: $DIRECT_URL"
          echo "dropbox_url=$DIRECT_URL" >> "$GITHUB_OUTPUT"

      - name: Notify n8n (callback)
        if: always()
        run: |
          JOB_ID="${{ steps.payload.outputs.job_id }}"
          STATUS="${{ job.status }}"
          CALLBACK_URL="${{ github.event.client_payload.callbackUrl || '' }}"
          DROPBOX_URL="${{ steps.dropbox.outputs.dropbox_url || '' }}"
          ARTIFACT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Use Dropbox URL as mp4Url if available, otherwise artifact URL
          if [ -n "$DROPBOX_URL" ]; then
            MP4_URL="$DROPBOX_URL"
          else
            MP4_URL="$ARTIFACT_URL"
          fi

          if [ -n "$CALLBACK_URL" ]; then
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"jobId\": \"$JOB_ID\",
                \"status\": \"$STATUS\",
                \"mp4Url\": \"$MP4_URL\",
                \"artifactUrl\": \"$ARTIFACT_URL\"
              }" || echo "⚠️ Callback failed (non-fatal)"
          fi
          echo "📤 Render $STATUS for job $JOB_ID"
