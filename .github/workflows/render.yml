name: Render Product Showcase

on:
  repository_dispatch:
    # v3.28b.6: accept BOTH event types so old n8n workflow can still trigger
    # in emergencies AND new Cloudflare Worker (which sends 'render') works
    types: [render-showcase, render]

  workflow_dispatch:
    inputs:
      payload_json:
        description: 'Base64-encoded payload JSON'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode payload
        id: payload
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          PAYLOAD_JSON_B64: ${{ inputs.payload_json }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            printf '%s' "$CLIENT_PAYLOAD" > render-payload-raw.json
            # GitHub repository_dispatch limits client_payload to 10 keys, so both
            # n8n (legacy) and the Cloudflare Worker (v3.28b.6) nest render fields
            # under "data". Unwrap them to top level here.
            jq '. as $root | (.data // {}) + {jobId: ($root.data.jobId // $root.jobId), callbackUrl: $root.callbackUrl}' render-payload-raw.json > render-payload.json
          else
            printf '%s' "$PAYLOAD_JSON_B64" | base64 -d > render-payload.json
          fi
          JOB_ID=$(jq -r '.jobId // "unknown"' render-payload.json)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Payload decoded for job: $JOB_ID"
          jq '{
            module: .module.name,
            segments: (.segments | length),
            callouts: (.callouts | length),
            textOverlays: (.textOverlays | length),
            effects: (.effects | length),
            audioPlacements: (.audioPlacements | length)
          }' render-payload.json

      - name: Render via Lambda
        run: npx tsx src/render.ts render-payload.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          REMOTION_REGION: ap-south-1

      - name: Read render result
        id: result
        run: |
          if [ -f "out/render-result.json" ]; then
            MP4_URL=$(jq -r '.mp4Url // ""' out/render-result.json)
            echo "mp4_url=$MP4_URL" >> "$GITHUB_OUTPUT"
            echo "Output URL: $MP4_URL"
          else
            echo "mp4_url=" >> "$GITHUB_OUTPUT"
            echo "No render result file found"
          fi

      # v3.28b.6: write status JSON to S3 so the browser can poll directly.
      # Replaces the old n8n callback. Runs even if render failed (if: always()).
      - name: Write job status to S3
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
          JOB_ID: ${{ steps.payload.outputs.job_id }}
          JOB_STATUS: ${{ job.status }}
          MP4_URL: ${{ steps.result.outputs.mp4_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          BUCKET=remotionlambda-apsouth1-9dlkcsayxl
          KEY="job-status/${JOB_ID}.json"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [ "$JOB_STATUS" = "success" ] && [ -n "$MP4_URL" ]; then
            FINAL_STATUS="success"
            BODY=$(jq -n \
              --arg jobId "$JOB_ID" \
              --arg mp4Url "$MP4_URL" \
              --arg completedAt "$NOW" \
              --arg runUrl "$RUN_URL" \
              '{status: "success", jobId: $jobId, mp4Url: $mp4Url, completedAt: $completedAt, runUrl: $runUrl}')
          else
            FINAL_STATUS="failed"
            BODY=$(jq -n \
              --arg jobId "$JOB_ID" \
              --arg completedAt "$NOW" \
              --arg runUrl "$RUN_URL" \
              '{status: "failed", jobId: $jobId, completedAt: $completedAt, error: "Render failed — see GitHub Actions logs", logsUrl: $runUrl, runUrl: $runUrl}')
          fi

          echo "Writing status JSON: $FINAL_STATUS"
          echo "$BODY" | tee /tmp/status.json

          aws s3 cp /tmp/status.json "s3://${BUCKET}/${KEY}" \
            --content-type "application/json" \
            --cache-control "no-cache, no-store" \
            --acl public-read

          echo "Status published to: https://${BUCKET}.s3.ap-south-1.amazonaws.com/${KEY}"

      # v3.28b.6: keep the n8n callback step ONLY if a callbackUrl is provided
      # in the payload. The Cloudflare Worker does NOT send a callbackUrl, so
      # this step becomes a no-op for new jobs. Keeps legacy n8n triggers working.
      - name: Notify legacy callback (optional)
        if: always()
        env:
          JOB_ID: ${{ steps.payload.outputs.job_id }}
          STATUS: ${{ job.status }}
          CALLBACK_URL: ${{ github.event.client_payload.callbackUrl }}
          MP4_URL: ${{ steps.result.outputs.mp4_url }}
          ARTIFACT_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$CALLBACK_URL" ]; then
            echo "Legacy callback URL present — notifying $CALLBACK_URL"
            BODY=$(jq -n \
              --arg jobId "$JOB_ID" \
              --arg status "$STATUS" \
              --arg mp4Url "$MP4_URL" \
              --arg artifactUrl "$ARTIFACT_URL" \
              '{jobId: $jobId, status: $status, mp4Url: $mp4Url, artifactUrl: $artifactUrl}')
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "$BODY" || echo "Callback failed (non-fatal)"
          else
            echo "No legacy callback URL — skipping (v3.28b.6+ uses S3 status JSON)"
          fi
          echo "Render $STATUS for job $JOB_ID"
